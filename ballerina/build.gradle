import org.apache.tools.ant.taskdefs.condition.Os

plugins {
    id 'io.ballerina.plugin'
}

description = 'Redis-backed short-term chat message store - Ballerina'

def packageName = "ai.memory.redis"
def packageOrg = "ballerinax"
def tomlVersion = stripBallerinaExtensionVersion("${project.version}")
def ballerinaTomlFilePlaceHolder = new File("${project.rootDir}/build-config/resources/Ballerina.toml")
def ballerinaTomlFile = new File("$project.projectDir/Ballerina.toml")

def stripBallerinaExtensionVersion(String extVersion) {
    if (extVersion.matches(project.ext.timestampedVersionRegex)) {
        def splitVersion = extVersion.split('-')
        if (splitVersion.length > 3) {
            def strippedValues = splitVersion[0..-4]
            return strippedValues.join('-')
        } else {
            return extVersion
        }
    } else {
        return extVersion.replace("${project.ext.snapshotVersion}", "")
    }
}

ballerina {
    packageOrganization = packageOrg
    module = packageName
    testCoverageParam = "--code-coverage --coverage-format=xml"
    isConnector = true
    platform = "any"
}

task updateTomlFiles {
    doLast {
        def newBallerinaToml = ballerinaTomlFilePlaceHolder.text.replace("@project.version@", project.version)
        newBallerinaToml = newBallerinaToml.replace("@toml.version@", tomlVersion)
        ballerinaTomlFile.text = newBallerinaToml
    }
}

task commitTomlFiles {
    doLast {
        project.exec {
            ignoreExitValue true
            if (Os.isFamily(Os.FAMILY_WINDOWS)) {
                commandLine 'cmd', '/c', "git commit -m \"[Automated] Update the toml files\" Ballerina.toml Dependencies.toml"
            } else {
                commandLine 'sh', '-c', "git commit -m '[Automated] Update the toml files' Ballerina.toml Dependencies.toml"
            }
        }
    }
}

tasks.register('startRedisServer') {
    doLast {
        def stdOut = new ByteArrayOutputStream()
        def cmd = Os.isFamily(Os.FAMILY_WINDOWS) ? ['cmd', '/c'] : ['sh', '-c']
        exec {
            commandLine cmd + ["docker compose -f tests/resources/compose.yaml ps --services --filter status=running"]
            standardOutput = stdOut
        }
        if (stdOut.toString().trim().isEmpty()) {
            println "Starting the Redis container"
            exec {
                commandLine cmd + ["docker compose -f tests/resources/compose.yaml up -d"]
            }

            def healthCheckPassed = false
            int retries = 18
            for (int i = 0; i < retries; i++) {
                def healthOut = new ByteArrayOutputStream()
                exec {
                    commandLine cmd + ["docker compose -f tests/resources/compose.yaml exec redis redis-cli ping"]
                    standardOutput = healthOut
                    ignoreExitValue = true
                }
                if (healthOut.toString().trim().equals("PONG")) {
                    healthCheckPassed = true
                    break
                }
                sleep(5 * 1000)
            }
            if (!healthCheckPassed) {
                throw new GradleException("The Redis container did not become healthy in time.")
            }
            println "The Redis container is healthy."
        } else {
            println "Expected Redis container is already running, not starting new containers."
        }
    }
}

tasks.register('stopRedisServer') {
    doLast {
        def stdOut = new ByteArrayOutputStream()
        def cmd = Os.isFamily(Os.FAMILY_WINDOWS) ? ['cmd', '/c'] : ['sh', '-c']
        exec {
            commandLine cmd + ["docker compose -f tests/resources/compose.yaml ps --services --filter status=running"]
            standardOutput = stdOut
        }
        if (!stdOut.toString().trim().isEmpty()) {
            println "Stopping the Redis container"
            exec {
                commandLine cmd + ["docker compose -f tests/resources/compose.yaml rm -svf"]
                standardOutput = stdOut
            }
            println stdOut.toString()
        } else {
            println "The Redis server is not started."
        }
    }
}

publishing {
    publications {
        maven(MavenPublication) {
            artifact source: createArtifactZip, extension: 'zip'
        }
    }
    repositories {
        maven {
            name = "GitHubPackages"
            url = uri("https://maven.pkg.github.com/ballerina-platform/module-${packageOrg}-${packageName}")
            credentials {
                username = System.getenv("publishUser")
                password = System.getenv("publishPAT")
            }
        }
    }
}

clean {
    delete 'build'
}

build.dependsOn "generatePomFileForMavenPublication"
publishToMavenLocal.dependsOn build
publish.dependsOn build
test.dependsOn "startRedisServer"
test.finalizedBy "stopRedisServer"
build.dependsOn "updateTomlFiles"
build.finalizedBy "commitTomlFiles"
